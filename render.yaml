services:
  - type: web
    name: medical-assistant
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PUBMED_API_KEY
        sync: false
      - key: UPTODATE_API_KEY
        sync: false
      - key: MEDSCAPE_API_KEY
        sync: false
      - key: CLINICALTRIALS_API_KEY
        sync: false 